<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Request Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .category-badge {
            display: inline-block;
            background: #edf2f7;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-clear:hover {
            background: #edf2f7;
        }

        .summary-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
            display: none;
        }

        .summary-section.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 16px;
        }

        .summary-content {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            color: #2d3748;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status-message.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .status-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .status-loading {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .loader {
            display: inline-block;
            width: 4px;
            height: 4px;
            margin-right: 6px;
            background: #2c5282;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .info-box {
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
            margin-top: 20px;
            line-height: 1.5;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Purchase Request</h1>
            <p>Submit items for tomorrow's orders</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <form id="purchaseForm">
            <div class="form-group">
                <label for="frozenFood">
                    Frozen Food
                    <span class="category-badge">Category 1</span>
                </label>
                <textarea 
                    id="frozenFood" 
                    name="frozenFood" 
                    placeholder="List items needed (e.g., frozen vegetables, frozen fish)"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="bumbu">
                    Bumbu
                    <span class="category-badge">Category 2</span>
                </label>
                <textarea 
                    id="bumbu" 
                    name="bumbu" 
                    placeholder="List spices and seasonings needed (e.g., coriander, turmeric)"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="others">
                    Others
                    <span class="category-badge">Category 3</span>
                </label>
                <textarea 
                    id="others" 
                    name="others" 
                    placeholder="List other items (e.g., rice, oil, vegetables)"
                ></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitBtn">Submit Request</button>
                <button type="reset" class="btn-clear">Clear Form</button>
            </div>
        </form>

        <div class="info-box">
            <strong>Setup Required:</strong> Replace <code>YOUR_GOOGLE_SCRIPT_URL</code> in the JavaScript code with your Google Apps Script deployment URL.
        </div>

        <div id="summarySection" class="summary-section">
            <div class="summary-title">Tomorrow's Request Summary</div>
            <div id="summaryContent" class="summary-content"></div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace this with your actual Google Apps Script deployment URL
        // Your Apps Script URL should end with /exec
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBbHXWyq-cdY39dXGHR8cM2H9q9sttHZsHpmTiSylHoub5jpMzAWFVlzRB0pnmXc4u3A/exec';

        const form = document.getElementById('purchaseForm');
        const statusMessage = document.getElementById('statusMessage');
        const summarySection = document.getElementById('summarySection');
        const summaryContent = document.getElementById('summaryContent');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate that at least one field has content
            const frozenFood = document.getElementById('frozenFood').value.trim();
            const bumbu = document.getElementById('bumbu').value.trim();
            const others = document.getElementById('others').value.trim();

            if (!frozenFood && !bumbu && !others) {
                showStatus('Please enter at least one item in any category', 'error');
                return;
            }

            // Validate Google Script URL is set
            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_URL') {
                showStatus('Please set your Google Apps Script URL in the code first', 'error');
                return;
            }

            await submitRequest({
                frozenFood,
                bumbu,
                others,
                timestamp: new Date().toLocaleString()
            });
        });

        async function submitRequest(data) {
            submitBtn.disabled = true;
            showStatus('📤 Submitting your request...', 'loading');
            summarySection.classList.remove('visible');

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data),
                    mode: 'no-cors'
                });

                // With no-cors mode, we can't directly check response status
                // Wait a moment for processing, then show success
                await new Promise(resolve => setTimeout(resolve, 1000));

                showStatus('✅ Request submitted successfully!', 'success');
                displaySummary(data);
                form.reset();

            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Failed to submit. Check your internet connection and Google Script URL.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message visible status-${type}`;

            if (type !== 'loading') {
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 4000);
            }
        }

        function displaySummary(data) {
            let summary = '📋 TOMORROW\'S PURCHASE REQUEST\n\n';
            summary += '════════════════════════════════\n\n';

            if (data.frozenFood) {
                summary += '🧊 FROZEN FOOD\n';
                summary += data.frozenFood.split('\n').map(item => `  • ${item.trim()}`).join('\n') + '\n\n';
            }

            if (data.bumbu) {
                summary += '🌶️  BUMBU (SPICES)\n';
                summary += data.bumbu.split('\n').map(item => `  • ${item.trim()}`).join('\n') + '\n\n';
            }

            if (data.others) {
                summary += '📦 OTHERS\n';
                summary += data.others.split('\n').map(item => `  • ${item.trim()}`).join('\n') + '\n\n';
            }

            summary += '════════════════════════════════\n';
            summary += `Submitted: ${data.timestamp}`;

            summaryContent.textContent = summary;
            summarySection.classList.add('visible');
        }
    </script>
</body>
</html>
