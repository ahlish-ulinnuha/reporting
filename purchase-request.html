<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Request</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #718096;
            font-size: 14px;
        }

        /* Store Tabs */
        .store-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .store-tab {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .store-tab:hover {
            color: #667eea;
        }

        .store-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .store-tab .badge {
            display: inline-block;
            background: #edf2f7;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
            font-weight: 500;
        }

        .store-tab.active .badge {
            background: #667eea;
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .category-badge {
            display: inline-block;
            background: #edf2f7;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-clear:hover {
            background: #edf2f7;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status-message.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .status-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .status-loading {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
            display: none;
        }

        .summary-section.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 16px;
        }

        .summary-store {
            margin-bottom: 20px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .summary-store-name {
            font-weight: 600;
            color: #667eea;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .summary-content {
            color: #2d3748;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .info-box {
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
            margin-top: 20px;
            line-height: 1.5;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            color: #764ba2;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .store-tabs {
                gap: 4px;
            }

            .store-tab {
                padding: 10px 16px;
                font-size: 13px;
            }

            .store-tab .badge {
                margin-left: 4px;
                font-size: 11px;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Multi-Store Purchase Request</h1>
            <p>Submit items for tomorrow's orders across all stores</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <!-- Store Tabs -->
        <div class="store-tabs">
            <button class="store-tab active" data-store="store1">
                🏪 Jagoan 1
                <span class="badge" id="badge-store1">0</span>
            </button>
            <button class="store-tab" data-store="store2">
                🏪 Jagoan 2
                <span class="badge" id="badge-store2">0</span>
            </button>            
        </div>

        <form id="purchaseForm">
            <!-- Store 1 Tab -->
            <div id="store1" class="tab-content active">
                <div class="form-group">
                    <label for="store1-frozenFood">
                        Frozen Food                        
                    </label>
                    <textarea 
                        id="store1-frozenFood" 
                        name="store1-frozenFood" 
                        placeholder="- chikuwa \n - sosis jumbo \n - baso lobster"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="store1-others">
                        Lain-lain                        
                    </label>
                    <textarea 
                        id="store1-others" 
                        name="store1-others" 
                        placeholder="- sterofoam \n - cetik 7x10"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="store1-bumbu">
                        Bumbu                        
                    </label>
                    <textarea 
                        id="store1-bumbu" 
                        name="store1-bumbu" 
                        placeholder="- merah 1 \n - putih 2"
                    ></textarea>
                </div>                
            </div>

            <!-- Store 2 Tab -->
            <div id="store2" class="tab-content">
                <div class="form-group">
                    <label for="store2-frozenFood">
                        Frozen Food                        
                    </label>
                    <textarea 
                        id="store2-frozenFood" 
                        name="store2-frozenFood" 
                        placeholder="- chikuwa \n - sosis jumbo \n - baso lobster"
                    ></textarea>
                </div>

                 <div class="form-group">
                    <label for="store2-others">
                        Lain-lain
                    </label>
                    <textarea 
                        id="store2-others" 
                        name="store2-others" 
                        placeholder="- sterofoam \n - cetik 7x10"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="store2-bumbu">
                        Bumbu                        
                    </label>
                    <textarea 
                        id="store2-bumbu" 
                        name="store2-bumbu" 
                        placeholder="- merah 1 \n - putih 2"
                    ></textarea>
                </div>               
            </div>            

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitBtn">Submit All Stores</button>
                <button type="reset" class="btn-clear">Clear All</button>
            </div>
        </form>

        <div class="info-box">
            <strong>Setup Required:</strong> Replace <code>YOUR_GOOGLE_SCRIPT_URL</code> in the JavaScript code with your Google Apps Script deployment URL.
        </div>

        <div id="summarySection" class="summary-section">
            <div class="summary-title">📋 Tomorrow's Request Summary</div>
            <div id="summaryContent"></div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace this with your actual Google Apps Script deployment URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBbHXWyq-cdY39dXGHR8cM2H9q9sttHZsHpmTiSylHoub5jpMzAWFVlzRB0pnmXc4u3A/exec';

        const form = document.getElementById('purchaseForm');
        const statusMessage = document.getElementById('statusMessage');
        const summarySection = document.getElementById('summarySection');
        const summaryContent = document.getElementById('summaryContent');
        const submitBtn = document.getElementById('submitBtn');
        const storeTabs = document.querySelectorAll('.store-tab');
        const storeContents = document.querySelectorAll('.tab-content');

        // Tab switching
        storeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const storeId = tab.dataset.store;
                
                // Update active tab
                storeTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active content
                storeContents.forEach(content => content.classList.remove('active'));
                document.getElementById(storeId).classList.add('active');
            });
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect data from all stores
            const storesData = {
                store1: collectStoreData('store1'),
                store2: collectStoreData('store2'),
                store3: collectStoreData('store3'),
                timestamp: new Date().toLocaleString()
            };

            // Check if at least one store has data
            const hasData = Object.values(storesData).some((store, idx) => {
                if (idx < 3) { // Only check first 3 stores
                    return store.frozenFood || store.bumbu || store.others;
                }
                return false;
            });

            if (!hasData) {
                showStatus('Please enter at least one item in any store', 'error');
                return;
            }

            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_URL') {
                showStatus('Please set your Google Apps Script URL in the code first', 'error');
                return;
            }

            await submitRequest(storesData);
        });

        function collectStoreData(storeId) {
            return {
                frozenFood: document.getElementById(`${storeId}-frozenFood`).value.trim(),
                bumbu: document.getElementById(`${storeId}-bumbu`).value.trim(),
                others: document.getElementById(`${storeId}-others`).value.trim()
            };
        }

        function updateBadges() {
            ['store1', 'store2', 'store3'].forEach(storeId => {
                const data = collectStoreData(storeId);
                const count = [data.frozenFood, data.bumbu, data.others].filter(x => x).length;
                document.getElementById(`badge-${storeId}`).textContent = count;
            });
        }

        // Update badges on input change
        form.addEventListener('input', updateBadges);

        async function submitRequest(storesData) {
            submitBtn.disabled = true;
            showStatus('📤 Submitting requests for all stores...', 'loading');
            summarySection.classList.remove('visible');

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(storesData),
                    mode: 'no-cors'
                });

                await new Promise(resolve => setTimeout(resolve, 1000));

                showStatus('✅ All requests submitted successfully!', 'success');
                displaySummary(storesData);
                form.reset();
                updateBadges();

            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Failed to submit. Check your internet connection and Google Script URL.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message visible status-${type}`;

            if (type !== 'loading') {
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 4000);
            }
        }

        function displaySummary(storesData) {
            let html = '';

            ['store1', 'store2', 'store3'].forEach((storeId, idx) => {
                const storeNum = idx + 1;
                const data = storesData[storeId];

                if (data.frozenFood || data.bumbu || data.others) {
                    let storeSummary = '';

                    if (data.frozenFood) {
                        storeSummary += '🧊 FROZEN FOOD\n';
                        storeSummary += data.frozenFood.split('\n').map(item => `  • ${item.trim()}`).filter(x => x !== '  • ').join('\n') + '\n\n';
                    }

                    if (data.bumbu) {
                        storeSummary += '🌶️  BUMBU (SPICES)\n';
                        storeSummary += data.bumbu.split('\n').map(item => `  • ${item.trim()}`).filter(x => x !== '  • ').join('\n') + '\n\n';
                    }

                    if (data.others) {
                        storeSummary += '📦 OTHERS\n';
                        storeSummary += data.others.split('\n').map(item => `  • ${item.trim()}`).filter(x => x !== '  • ').join('\n');
                    }

                    html += `
                        <div class="summary-store">
                            <div class="summary-store-name">🏪 Store ${storeNum}</div>
                            <div class="summary-content">${storeSummary.trim()}</div>
                        </div>
                    `;
                }
            });

            if (html) {
                html += `<div style="text-align: center; color: #718096; font-size: 12px; margin-top: 16px;">Submitted: ${storesData.timestamp}</div>`;
                summaryContent.innerHTML = html;
                summarySection.classList.add('visible');
            }
        }

        // Initialize badges
        updateBadges();
    </script>
</body>
</html>
