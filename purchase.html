<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Request</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #718096;
            font-size: 14px;
        }

        /* Store Tabs */
        .store-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .store-tab {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .store-tab:hover {
            color: #667eea;
        }

        .store-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .store-tab .badge {
            display: inline-block;
            background: #edf2f7;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
            font-weight: 500;
        }

        .store-tab.active .badge {
            background: #667eea;
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .category-badge {
            display: inline-block;
            background: #edf2f7;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-clear:hover {
            background: #edf2f7;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status-message.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .status-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .status-loading {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
            display: none;
        }

        .summary-section.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 16px;
        }

        .summary-content {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            color: #2d3748;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .info-box {
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
            margin-top: 20px;
            line-height: 1.5;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .store-tabs {
                gap: 4px;
            }

            .store-tab {
                padding: 10px 16px;
                font-size: 13px;
            }

            .store-tab .badge {
                margin-left: 4px;
                font-size: 11px;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Multi-Store Purchase Request</h1>
            <p>Submit items for tomorrow's orders</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <!-- Store Tabs -->
        <div class="store-tabs">
            <button class="store-tab active" data-store="jg1">
                🏪 JG1
                <span class="badge" id="badge-jg1">0</span>
            </button>
            <button class="store-tab" data-store="jg2">
                🏪 JG2
                <span class="badge" id="badge-jg2">0</span>
            </button>            
        </div>

        <form id="purchaseForm">
            <!-- JG1 Tab -->
            <div id="jg1" class="tab-content active">
                <div class="form-group">
                    <label for="jg1-frozen">Frozen</label>
                    <textarea 
                        id="jg1-frozen" 
                        name="jg1-frozen" 
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - chikuwa &#10; - sosis jumbo &#10; - baso lobster"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="jg1-lain">Lain</label>
                    <textarea 
                        id="jg1-lain" 
                        name="jg1-lain"                         
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - sterofoam"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="jg1-bumbu">Bumbu</label>
                    <textarea 
                        id="jg1-bumbu" 
                        name="jg1-bumbu" 
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - merah 1 &#10; - putih 2"
                    ></textarea>
                </div>
            </div>

            <!-- JG2 Tab -->
            <div id="jg2" class="tab-content">
                <div class="form-group">
                    <label for="jg2-frozen">Frozen</label>
                    <textarea 
                        id="jg2-frozen" 
                        name="jg2-frozen" 
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - chikuwa &#10; - sosis jumbo &#10; - baso lobster"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="jg2-lain">Lain</label>
                    <textarea 
                        id="jg2-lain" 
                        name="jg2-lain" 
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - sterofoam"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="jg2-bumbu">Bumbu</label>
                    <textarea 
                        id="jg2-bumbu" 
                        name="jg2-bumbu" 
                        placeholder="Masukkan item (satu per baris), contoh: &#10; - merah 1 &#10; - putih 2"
                    ></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitBtn">📤 Submit</button>
                <button type="reset" class="btn-clear">🗑️ Clear</button>
            </div>
        </form>

        <div class="info-box">
            <strong>Setup:</strong> Ganti <code>YOUR_GOOGLE_SCRIPT_URL</code> dengan URL Google Apps Script Anda yang sudah di-deploy.
        </div>

        <div id="summarySection" class="summary-section">
            <div class="summary-title">📋 Formatted Summary</div>
            <div id="summaryContent" class="summary-content"></div>
            <button class="copy-btn" id="copyBtn">📋 Copy to Clipboard</button>
        </div>
    </div>

    <script>
        // ⚠️ PENTING: Ganti dengan URL Google Apps Script Anda
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBbHXWyq-cdY39dXGHR8cM2H9q9sttHZsHpmTiSylHoub5jpMzAWFVlzRB0pnmXc4u3A/exec';

        const form = document.getElementById('purchaseForm');
        const statusMessage = document.getElementById('statusMessage');
        const summarySection = document.getElementById('summarySection');
        const summaryContent = document.getElementById('summaryContent');
        const submitBtn = document.getElementById('submitBtn');
        const copyBtn = document.getElementById('copyBtn');
        const storeTabs = document.querySelectorAll('.store-tab');
        const storeContents = document.querySelectorAll('.tab-content');

        // Tab switching
        storeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const storeId = tab.dataset.store;
                
                storeTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                storeContents.forEach(content => content.classList.remove('active'));
                document.getElementById(storeId).classList.add('active');
            });
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Generate formatted string
            const formattedString = generateFormattedString();

            if (!formattedString || formattedString.trim() === '/laporan') {
                showStatus('❌ Mohon isi minimal satu item', 'error');
                return;
            }

            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_URL') {
                showStatus('❌ Silakan set Google Apps Script URL terlebih dahulu', 'error');
                return;
            }

            await submitRequest(formattedString);
        });

        function generateFormattedString() {
            let result = '/laporan\n';
            
            const stores = ['jg1', 'jg2'];
            const categories = ['frozen', 'lain', 'bumbu'];
            const categoryLabels = {
                'frozen': 'Frozen',
                'lain': 'Lain',
                'bumbu': 'Bumbu'
            };

            stores.forEach(store => {
                categories.forEach(category => {
                    const textarea = document.getElementById(`${store}-${category}`);
                    const value = textarea.value.trim();

                    if (value) {
                        const storeUpper = store.toUpperCase();
                        const categoryLabel = categoryLabels[category];
                        
                        result += `${categoryLabel} ${storeUpper}\n`;
                        
                        const items = value.split('\n').filter(item => item.trim());
                        items.forEach(item => {
                            result += `${item.trim()}\n`;
                        });
                        
                        result += '\n';
                    }
                });
            });

            return result.trim();
        }

        function updateBadges() {
            ['jg1', 'jg2'].forEach(storeId => {
                const frozen = document.getElementById(`${storeId}-frozen`).value.trim();
                const lain = document.getElementById(`${storeId}-lain`).value.trim();
                const bumbu = document.getElementById(`${storeId}-bumbu`).value.trim();
                
                const count = [frozen, lain, bumbu].filter(x => x).length;
                document.getElementById(`badge-${storeId}`).textContent = count;
            });
        }

        form.addEventListener('input', updateBadges);

        async function submitRequest(formattedString) {
            submitBtn.disabled = true;
            showStatus('📤 Mengirim..', 'loading');
            summarySection.classList.remove('visible');

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'generateSummary',
                        rawText: formattedString
                    }),
                    mode: 'no-cors'
                });

                await new Promise(resolve => setTimeout(resolve, 1000));

                showStatus('✅ Berhasil dikirim!', 'success');
                displaySummary(formattedString);
                form.reset();
                updateBadges();

            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Gagal mengirim. Periksa koneksi dan URL Google Script.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message visible status-${type}`;

            if (type !== 'loading') {
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 4000);
            }
        }

        function displaySummary(formattedString) {
            summaryContent.textContent = formattedString;
            summarySection.classList.add('visible');
        }

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            const text = summaryContent.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        });

        updateBadges();
    </script>
</body>
</html>
